[pytest]
# Pytest configuration for data and model validation tests

# Test discovery patterns
python_files = test_*.py *_test.py validate_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-component workflows
    data_validation: Data quality and drift detection tests
    model_validation: Model performance validation tests
    slow: Tests that take a long time to run
    requires_model: Tests that require trained model artifacts
    requires_kafka: Tests that require Kafka to be running

# Ignore paths
norecursedirs = 
    .git
    .venv
    __pycache__
    garbage
    ecs-backup
    ecs-deploy
    docs
    docs-capstone

# Coverage settings (if using pytest-cov)
[coverage:run]
source = src,tests
omit = 
    */tests/*
    */__pycache__/*
    */garbage/*

