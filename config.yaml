# Processing Engine Configuration (prioritize pandas/scikit-learn)
processing:
  default_engine: "pandas"  # "pandas" or "pyspark" - pandas prioritized for faster processing
  data_processing_engine: "pandas"  # Data preprocessing with pandas
  model_training_engine: "sklearn"  # Model training with scikit-learn
  inference_engine: "pandas"  # Inference with pandas (faster for single predictions)
  fallback_to_pyspark: true  # Allow fallback to PySpark for large datasets

# AWS S3 Configuration (uses environment variables from .env)
aws:
  region: "${AWS_DEFAULT_REGION}"  # Read from .env: AWS_DEFAULT_REGION
  s3_bucket: "${S3_BUCKET}"  # Read from .env: S3_BUCKET
  s3_kms_key_arn: "${S3_KMS_KEY_ARN}"  # Read from .env: S3_KMS_KEY_ARN (optional)
  force_s3_io: true  # Always use S3 for all storage

# MLflow Configuration

mlflow:
  # MLflow URLs - automatically selected based on CONTAINERIZED environment variable
  local_tracking_uri: "http://localhost:5001"           # Local MLflow server
  docker_tracking_uri: "http://mlflow-tracking:5001"    # Dockerized MLflow server
  experiment_name: "Churn Analysis"
  artifact_root: "s3://${S3_BUCKET}/artifacts/mlflow-artifacts"  # Uses S3_BUCKET from .env
  # S3-based tracking backend (instead of local files)
  s3_tracking_backend: true
  s3_tracking_bucket: "${S3_BUCKET}"  # Uses S3_BUCKET from .env
  s3_tracking_prefix: "artifacts/mlflow-tracking"
  model_registry_name: "churn_prediction"
  artifact_path: "model"
  run_name_prefix: "churn_run"
  tags:
    project: "customer_churn_prediction"
    team: "ml_engineering"
    environment: "development"
  autolog: true

# ==========================================
# Data Configuration
# ==========================================
# Choose which dataset to use for experiments
data:
  # Available options:
  # - "ChurnModelling.csv" (original with missing values - validation will FAIL)
  # - "ChurnModelling_Clean.csv" (imputed Gender values - validation will PASS)
  raw_data_file: "ChurnModelling_Clean.csv"  # Change to test validation pass/fail
  
  # S3 bucket for data storage (uses S3_BUCKET from .env)
  s3_bucket: "${S3_BUCKET}"
  s3_prefix: "data/raw"

data_paths:
  # raw_data is now constructed dynamically from data.raw_data_file
  # raw_data: "s3://zuucrew-mlflow-artifacts-prod/data/raw/ChurnModelling.csv"  # Legacy - use data.raw_data_file instead
  processed_data: "data/processed/ChurnModelling_Missing_Values_Handled.csv"
  imputed_data: "data/processed/imputed.csv"
  processed_dir: "data/processed"
  artifacts_dir: "artifacts"
  data_artifacts_dir: "artifacts/data"
  train_artifacts_dir: "artifacts/train_artifacts"
  X_train: "artifacts/data/X_train.csv"
  X_test: "artifacts/data/X_test.csv"
  Y_train: "artifacts/data/Y_train.csv"
  Y_test: "artifacts/data/Y_test.csv"

columns:
  target: "Exited"
  drop_columns: ["CustomerId", "RowNumber", "Surname"]
  critical_columns: ["Firstname"]
  outlier_columns: ["CreditScore", "Age", "NumOfProducts"]
  nominal_columns: ["Geography", "Gender"]
  numeric_columns: ["Balance", "EstimatedSalary"]
  feature_columns:
    - "CreditScore"
    - "Geography"
    - "Gender"
    - "Age"
    - "Tenure"
    - "Balance"
    - "NumOfProducts"
    - "HasCrCard"
    - "IsActiveMember"
    - "EstimatedSalary"

missing_values:
  strategy: "fill"
  methods:
    age:
      strategy: "fill"
      method: "mean"
      relevant_column: "Age"
    gender:
      strategy: "fill"
      method: "mode"
      relevant_column: "Gender"
      use_gender_imputer: true

outlier_detection:
  detection_method: "iqr"
  handling_method: "remove"
  z_score_threshold: 3.0

feature_binning:
  credit_score_bins:
    Poor: [300, 580]
    Fair: [580, 670]
    Good: [670, 740]
    Very Good: [740, 800]
    Excellent: [800, 850]
  credit_score_mapping:
    Poor: 0
    Fair: 1
    Good: 2
    Very Good: 3
    Excellent: 4

feature_encoding:
  nominal_columns: ["Geography", "Gender"]
  ordinal_mappings:
    CreditScoreBins:
      Poor: 0
      Fair: 1
      Good: 2
      Very Good: 3
      Excellent: 4

feature_scaling:
  scaling_type: "minmax"
  columns_to_scale: ["Balance", "EstimatedSalary", "Age"]

data_splitting:
  split_type: "simple"
  test_size: 0.2
  random_state: 42
  n_splits: 5

training:
  default_training_engine: "sklearn"
  default_model_type: "random_forest"
  default_training_strategy: "cv"
  cv_folds: 5
  random_state: 42
  test_size: 0.2
  validation_split: 0.2
  early_stopping_patience: 10
  max_iterations: 1000
  hyperparameter_tuning:
    enabled: false
    search_method: "grid"
    cv_folds: 5
    n_iter: 20
  
  # PySpark-specific training configurations
  pyspark_training:
    cache_data: true
    checkpoint_interval: 10
    parallelism: "auto"
    max_memory_fraction: 0.8
    
  # Scikit-learn training configurations (backward compatibility)
  sklearn_training:
    n_jobs: -1
    verbose: 1

model:
  # Training engine: "sklearn" or "pyspark" (default: sklearn for faster processing)
  training_engine: "sklearn"
  model_type: "random_forest"
  training_strategy: "cv"
  data_path: "data/raw/ChurnModelling.csv"
  model_path: "artifacts/models/spark_random_forest_cv_model"
  evaluation_path: "artifacts/evaluation/spark_random_forest_cv_evaluation_report.txt"
  model_params:
    numTrees: 100
    maxDepth: 10
    seed: 42
  
  # Scikit-learn model configurations (backward compatibility)
  sklearn_model_types:
    random_forest:
      n_estimators: 100
      max_depth: 10
      random_state: 42
    gradient_boosting:
      n_estimators: 100
      max_depth: 5
      random_state: 42
    logistic_regression:
      random_state: 42
      max_iter: 1000
    svm:
      random_state: 42
      probability: true
  
  # PySpark MLlib model configurations
  pyspark_model_types:
    spark_random_forest:
      numTrees: 100
      maxDepth: 10
      minInstancesPerNode: 1
      seed: 42
      featuresCol: "features"
      labelCol: "label"
      predictionCol: "prediction"
    spark_gbt:
      maxIter: 100
      maxDepth: 5
      stepSize: 0.1
      seed: 42
      featuresCol: "features"
      labelCol: "label"
      predictionCol: "prediction"
    spark_logistic_regression:
      maxIter: 1000
      regParam: 0.01
      elasticNetParam: 0.0
      seed: 42
      featuresCol: "features"
      labelCol: "label"
      predictionCol: "prediction"
      probabilityCol: "probability"

evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1-score"
  cv_folds: 5
  random_state: 42

deployment:
  model_name: "churn_analysis_model"
  model_version: "1.0.0"
  api_endpoint: "/predict"
  batch_size: 1000

inference:
  model_name: "random_forest_cv_model"
  data_path: "artifacts/data/X_test.csv"
  sample_size: 100
  save_path: "artifacts/predictions/predictions.csv"
  batch_size: 1000
  return_proba: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file: "pipeline.log"

environment:
  experiment_name: "churn_analysis"

pipeline:
  data_pipeline_name: "data_processing_pipeline"
  training_pipeline_name: "model_training_pipeline"
  deployment_pipeline_name: "model_deployment_pipeline"
  inference_pipeline_name: "inference_pipeline"
  enable_cache: false

# ==========================================
# Kafka Streaming Configuration
# ==========================================
# Kafka bootstrap_servers is read from KAFKA_BOOTSTRAP_SERVERS environment variable
kafka:
  # bootstrap_servers: "localhost:9092"  # Commented out - use env var instead
  topics:
    customer_events: "customer-events"
    predictions: "churn-predictions"
  consumer:
    group_id: "churn-inference-group"
    batch_size: 1000
    timeout_seconds: 30
    auto_offset_reset: "earliest"
    enable_auto_commit: true
    max_poll_records: 1000
  producer:
    compression_type: "gzip"
    max_request_size: 1048576
    acks: "all"
    retries: 3
  schema_registry:
    enabled: false  # Optional: enable for Avro schema validation


  
# ==========================================
# Analytics Configuration
# ==========================================
analytics:
  aggregation_interval: 3600  # 1 hour in seconds
  high_risk_threshold: 0.7  # Risk score >= 0.7 triggers alert
  enable_daily_aggregation: true
  enable_hourly_aggregation: true

# ==========================================
# Data Validation & Testing Configuration
# ==========================================
validation:
  # Data Quality Thresholds
  data_quality:
    min_rows: 5000  # Minimum rows required in dataset
    min_columns: 12  # Minimum columns required (after dropping ID columns)
    max_missing_percentage: 8.0  # Max % of missing values allowed per column
    max_duplicate_percentage: 1.0  # Max % of duplicate rows allowed
    
  # Only check missing values for model-critical columns
  # These are the columns actually used for training
  critical_columns_for_missing:
    - "CreditScore"
    - "Geography"
    - "Gender"
    - "Age"
    - "Tenure"
    - "Balance"
    - "NumOfProducts"
    - "HasCrCard"
    - "IsActiveMember"
    - "EstimatedSalary"
    - "Exited"  # Target variable
  
  # Value Range Validation
  value_ranges:
    CreditScore:
      min: 300
      max: 900
    Age:
      min: 18
      max: 100
    Tenure:
      min: 0
      max: 10
    Balance:
      min: 0
      max: null  # No upper limit
    NumOfProducts:
      min: 1
      max: 4
    EstimatedSalary:
      min: 0
      max: null  # No upper limit
    Exited:
      values: [0, 1]  # Binary
  
  # Categorical Value Validation
  categorical_values:
    Geography:
      - "France"
      - "Spain"
      - "Germany"
    Gender:
      - "Male"
      - "Female"
  
  # Class Balance Validation
  class_balance:
    target_column: "Exited"
    min_minority_percentage: 20.0  # Min % for minority class
    max_majority_percentage: 80.0  # Max % for majority class
  
  # Data Drift Detection
  drift_detection:
    enabled: true
    method: "kolmogorov_smirnov"  # KS test
    significance_level: 0.05  # p-value threshold
    columns_to_check:  # Check drift only for numeric features
      - "CreditScore"
      - "Age"
      - "Tenure"
      - "Balance"
      - "NumOfProducts"
      - "EstimatedSalary"
  
  # Outlier Detection Thresholds
  outlier_thresholds:
    max_outlier_percentage: 10.0  # Max % of outliers allowed
    method: "iqr"  # or "z_score"
    iqr_multiplier: 1.5
    z_score_threshold: 3.0
    columns_to_check:
      - "CreditScore"
      - "Age"
      - "Balance"
      - "NumOfProducts"


# ==========================================
# Model Validation Configuration
# ==========================================
model_validation:
  # Performance Thresholds (CI/CD Gates)
  # Only accuracy is checked for deployment gate
  performance_thresholds:
    accuracy: 0.75  # HARD REQUIREMENT - blocks deployment if not met
    # Other metrics are reported but not enforced
    # precision: 0.65
    # recall: 0.65
    # f1_score: 0.60
  
  # Model Quality Checks
  quality_checks:
    check_overfitting: true
    max_train_test_gap: 0.10  # Max 10% difference between train and test metrics
    check_feature_importance: true
    min_feature_importance_sum: 0.90  # Top features should explain 90% of variance
  
  # Prediction Quality
  prediction_quality:
    check_probability_distribution: true
    min_probability: 0.0
    max_probability: 1.0
    check_prediction_balance: true
  retention_days: 90  # Keep raw predictions for 90 days